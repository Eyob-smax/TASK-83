# EventOps Docker Compose — 3-service stack: mysql, backend, frontend
#
# Usage:
#   cp .env.example .env          # populate credentials
#   docker compose up --build     # build images and start all services
#
# Ports (host → container):
#   https://localhost:${FRONTEND_PORT:-443}     → nginx (port 443, TLS)
#   https://localhost:${BACKEND_PORT:-8443}     → Spring Boot (port 8443)
#   localhost:${MYSQL_PORT:-3306}               → MySQL (port 3306)
#
# The backend is addressed as 'mysql' by the backend service (DB_HOST: mysql)
# because Docker Compose service names act as internal DNS hostnames.
# The nginx frontend proxies /api/* to https://backend:8443.
# SSL_ENABLED defaults to true in this secure acceptance path.

services:
  # MySQL 8.x database
  mysql:
    image: mysql:8.0
    container_name: eventops-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-eventops_root}
      MYSQL_DATABASE: ${DB_NAME:-eventops}
      MYSQL_USER: ${DB_USERNAME:-eventops}
      MYSQL_PASSWORD: ${DB_PASSWORD:-eventops_dev}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eventops-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-eventops}
      DB_USERNAME: ${DB_USERNAME:-eventops}
      DB_PASSWORD: ${DB_PASSWORD:-eventops_dev}
      SERVER_PORT: 8443
      SSL_ENABLED: ${SSL_ENABLED:-true}
      ENCRYPTION_SECRET_KEY: ${ENCRYPTION_SECRET_KEY}
      # CORS: allow the nginx frontend (same-origin proxy means this is only
      # needed for direct API access, e.g. local dev or automated test clients)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost:443,http://localhost:5173,http://localhost}
      BACKUP_PATH: /var/eventops/backups
      EXPORT_PATH: /var/eventops/exports
      SHARED_FOLDER_PATH: /var/eventops/shared
      ATTACHMENT_PATH: /var/eventops/attachments
    ports:
      - "${BACKEND_PORT:-8443}:8443"
    volumes:
      - backup-data:/var/eventops/backups
      - export-data:/var/eventops/exports
      - shared-data:/var/eventops/shared
      - attachment-data:/var/eventops/attachments

  # Vue.js frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eventops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-443}:443"

volumes:
  mysql-data:
  backup-data:
  export-data:
  shared-data:
  attachment-data:
