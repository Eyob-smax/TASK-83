server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;
    ssl_certificate /etc/nginx/certs/frontend.crt;
    ssl_certificate_key /etc/nginx/certs/frontend.key;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes handled by Vue Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service.
    # Uses HTTPS because the default Docker Compose deployment runs with
    # SSL_ENABLED=true on the backend (port 8443, TLS).
    # Keep proxy_ssl_verify off only for local self-signed certificates.
    location /api/ {
        proxy_pass https://backend:8443/api/;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
