spring:
  application:
    name: eventops-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eventops}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:eventops}
    password: ${DB_PASSWORD:eventops_dev}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE:classpath:keystore/dev-keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: PKCS12
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

logging:
  level:
    root: INFO
    com.eventops: ${LOG_LEVEL:DEBUG}
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"

# Application-specific configuration
eventops:
  security:
    rate-limit:
      requests-per-minute: ${RATE_LIMIT_RPM:60}
    login-throttle:
      max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
      lockout-duration-minutes: ${LOGIN_LOCKOUT_MINUTES:15}
    signature:
      enabled: ${SIGNATURE_ENABLED:true}
      algorithm: HmacSHA256
      max-age-seconds: 300
      secret-key: ${SIGNATURE_SECRET_KEY:}
    password:
      algorithm: bcrypt
      strength: 12
  encryption:
    algorithm: AES
    transformation: AES/GCM/NoPadding
    key-size: 256
    secret-key: ${ENCRYPTION_SECRET_KEY}
  backup:
    enabled: ${BACKUP_ENABLED:true}
    cron: "0 0 2 * * ?"
    retention-days: 30
    target-path: ${BACKUP_PATH:/var/eventops/backups}
  importing:
    concurrency-cap: ${IMPORT_CONCURRENCY:3}
    timeout-seconds: ${IMPORT_TIMEOUT:30}
    circuit-breaker-threshold: ${IMPORT_CB_THRESHOLD:10}
  notification:
    retry:
      max-attempts: 5
      backoff-initial-seconds: 12
      backoff-max-minutes: 10
    dnd:
      default-start: "21:00"
      default-end: "07:00"
  checkin:
    passcode:
      rotation-seconds: 60
      digit-count: 6
    window:
      before-start-minutes: 30
      after-start-minutes: 15
  export:
    watermark-enabled: ${WATERMARK_ENABLED:true}
    storage-path: ${EXPORT_PATH:/var/eventops/exports}
  shared-folder:
    base-path: ${SHARED_FOLDER_PATH:/var/eventops/shared}
  attachment:
    storage-path: ${ATTACHMENT_PATH:/var/eventops/attachments}
    max-size-mb: ${ATTACHMENT_MAX_SIZE:50}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:443,http://localhost:5173,http://localhost}
